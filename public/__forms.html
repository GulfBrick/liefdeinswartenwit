<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <form name="rsvp" method="POST" data-netlify="true" hidden>
      <input type="hidden" name="form-name" value="rsvp" />
      <input type="text" name="fullName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="attending" />
      <input type="text" name="guestCount" />
      <input type="text" name="guestNames" />
      <input type="text" name="dietary" />
      <input type="text" name="needsAccommodation" />
      <input type="text" name="accommodationType" />
      <textarea name="message"></textarea>
      <input type="text" name="guestCode" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
